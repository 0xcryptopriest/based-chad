<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Base Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <img src="base-logo.png" alt="Base Logo" />
      <span>Base Dashboard</span>
    </div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Wallet</a>
      <a href="#">Stats</a>
      <a href="#">Docs</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to Base Dashboard</h1>
      <p>Track your wallet, assets, and activity on Base.</p>

      <button class="btn">Connect Wallet</button>
    </div>

    <div class="hero-logo">
      <img src="base-logo.png" alt="Base Logo Large" />
    </div>
  </section>

</body>
</html>
