<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Base Presale</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .presale-container{
      width:100%;
      max-width:520px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:25px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .logo{
      text-align:center;
      margin-bottom:25px;
    }

    .logo h1{
      font-size:2.5rem;
      margin-bottom:8px;
    }

    .logo p{
      opacity:0.8;
      font-size:14px;
    }

    .price-section{
      display:flex;
      justify-content:space-between;
      margin-bottom:25px;
      gap:15px;
    }

    .price-box{
      flex:1;
      background:#111827;
      padding:18px;
      border-radius:18px;
      text-align:center;
    }

    .price-box p{
      opacity:0.7;
      margin-bottom:8px;
      font-size:14px;
    }

    .price-box h2{
      font-size:1.4rem;
    }

    .progress-wrapper{
      margin-bottom:25px;
    }

    .progress-bar{
      width:100%;
      height:14px;
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
    }

    .progress-fill{
      width:72%;
      height:100%;
      background:#0052ff;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-size:13px;
      opacity:0.8;
    }

    .countdown{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:25px;
    }

    .time-box{
      flex:1;
      background:#111827;
      padding:15px;
      border-radius:16px;
      text-align:center;
    }

    .time-box h2{
      font-size:1.5rem;
    }

    .time-box p{
      font-size:12px;
      opacity:0.7;
      margin-top:5px;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      background:#1e293b;
      color:white;
      outline:none;
      margin-bottom:18px;
      font-size:15px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      background:#0052ff;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
    }

    .info{
      margin-top:20px;
      text-align:center;
      font-size:13px;
      opacity:0.7;
      line-height:1.6;
    }

  </style>
</head>
<body>

  <div class="presale-container">

    <div class="logo">
      <h1>BASE PRESALE</h1>
      <p>Next Generation Base Ecosystem Token</p>
    </div>

    <div class="price-section">

      <div class="price-box">
        <p>Presale Price</p>
        <h2>$0.015</h2>
      </div>

      <div class="price-box">
        <p>Launch Price</p>
        <h2>$0.045</h2>
      </div>

    </div>

    <div class="progress-wrapper">

      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>

      <div class="stats">
        <span>$720,000 Raised</span>
        <span>$1,000,000 Goal</span>
      </div>

    </div>

    <div class="countdown">

      <div class="time-box">
        <h2 id="days">00</h2>
        <p>Days</p>
      </div>

      <div class="time-box">
        <h2 id="hours">00</h2>
        <p>Hours</p>
      </div>

      <div class="time-box">
        <h2 id="minutes">00</h2>
        <p>Minutes</p>
      </div>

      <div class="time-box">
        <h2 id="seconds">00</h2>
        <p>Seconds</p>
      </div>

    </div>

    <input 
      type="number"
      id="ethInput"
      placeholder="Enter ETH amount"
    >

    <button onclick="buyNow()">
      Buy Tokens
    </button>

    <div class="info">
      Connect wallet integration coming soon.<br>
      Base Network Supported.
    </div>

  </div>

  <script>

    function buyNow(){

      const amount = document.getElementById("ethInput").value;

      if(!amount || amount <= 0){
        alert("Enter a valid ETH amount");
        return;
      }

      alert("Presale purchase initialized for " + amount + " ETH");
    }

    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 10);

    function updateCountdown(){

      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;

    }

    setInterval(updateCountdown,1000);

    updateCountdown();

  </script>

</body>
</html>
