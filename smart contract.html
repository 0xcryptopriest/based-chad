<section class="contract-checker">

  <h2>Smart Contract Checker</h2>
  <p>Analyze smart contracts deployed on Base.</p>

  <div class="checker-box">

    <input 
      type="text" 
      id="contractInput"
      placeholder="Enter smart contract address..."
    />

    <button onclick="checkContract()">
      Analyze Contract
    </button>

  </div>

  <div class="contract-result" id="contractResult">
    Waiting for contract input...
  </div>

</section>
