<!-- LANGUAGE SELECT -->
<select id="languageSelect">

  <option value="en">English</option>
  <option value="fr">Français</option>
  <option value="es">Español</option>
  <option value="de">Deutsch</option>
  <option value="pt">Português</option>
  <option value="it">Italiano</option>
  <option value="nl">Nederlands</option>
  <option value="ar">العربية</option>
  <option value="zh">中文</option>
  <option value="ja">日本語</option>
  <option value="ko">한국어</option>
  <option value="hi">हिन्दी</option>

</select>

<style>

  #languageSelect{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    outline:none;
    margin-bottom:18px;
    font-size:15px;
    cursor:pointer;
  }

</style>

<script>

  const languageSelect = document.getElementById("languageSelect");

  languageSelect.addEventListener("change", function () {
    const lang = this.value;

    // simple demo behavior (you can expand later with real translations)
    const messages = {
      en: "Language set to English",
      fr: "Langue réglée sur le français",
      es: "Idioma configurado a Español",
      de: "Sprache auf Deutsch gesetzt",
      pt: "Idioma definido para Português",
      it: "Lingua impostata su Italiano",
      nl: "Taal ingesteld op Nederlands",
      ar: "تم تغيير اللغة إلى العربية",
      zh: "语言已设置为中文",
      ja: "言語が日本語に設定されました",
      ko: "언어가 한국어로 설정되었습니다",
      hi: "भाषा हिंदी में सेट की गई"
    };

    alert(messages[lang] || "Language updated");
  });

</script>
